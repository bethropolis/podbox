version: 2

project_name: podbox

before:
  hooks:
    - rustup target add x86_64-unknown-linux-gnu x86_64-unknown-linux-musl

builds:
  - id: podbox
    builder: rust
    command: build
    binary: podbox
    targets:
      - x86_64-unknown-linux-gnu
    flags:
      - --release
      - -p=podbox

  - id: podbox-guest
    builder: rust
    command: build
    binary: podbox-guest
    targets:
      - x86_64-unknown-linux-musl
    flags:
      - --release
      - -p=podbox-guest

archives:
  - id: podbox
    ids:
      - podbox
    name_template: "podbox-{{ .Tag }}-linux-x86_64"
    formats: ["tar.gz"]
    wrap_in_directory: false
  - id: podbox-guest
    ids:
      - podbox-guest
    name_template: "podbox-guest-{{ .Tag }}-linux-x86_64-musl"
    formats: ["tar.gz"]
    wrap_in_directory: false

  - id: podbox-homebrew
    ids:
      - podbox
      - podbox-guest
    name_template: "podbox-{{ .Tag }}-homebrew"
    formats: ["tar.gz"]
    wrap_in_directory: false

checksum:
  name_template: "checksums.txt"

dockers_v2:
  - id: cachy
    ids:
      - podbox-guest
    images:
      - "ghcr.io/{{ .Env.GITHUB_REPOSITORY_OWNER }}/podbox"
    tags:
      - "cachy-{{ .Tag }}"
      - "cachy-latest"
    dockerfile: Dockerfile.goreleaser
    platforms:
      - linux/amd64
    build_args:
      BASE_IMAGE: docker.io/cachyos/cachyos:latest
    labels:
      org.opencontainers.image.source: "{{ .Env.GITHUB_SERVER_URL }}/{{ .Env.GITHUB_REPOSITORY }}"
      org.opencontainers.image.created: "{{ .Date }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.version: "{{ .Tag }}"
      podbox.guest_version: "{{ .Tag }}"
      podbox.protocol_version: "1"
      podbox.integration.wayland: "true"
      podbox.integration.audio: "true"
      podbox.integration.gpu: "true"
      podbox.integration.dbus: "true"
      podbox.shell: "/usr/bin/fish"
      podbox.default_shell: "/usr/bin/fish"

  - id: fedora
    ids:
      - podbox-guest
    images:
      - "ghcr.io/{{ .Env.GITHUB_REPOSITORY_OWNER }}/podbox"
    tags:
      - "fedora-{{ .Tag }}"
      - "fedora-latest"
    dockerfile: Dockerfile.goreleaser
    platforms:
      - linux/amd64
    build_args:
      BASE_IMAGE: docker.io/library/fedora:44
    labels:
      org.opencontainers.image.source: "{{ .Env.GITHUB_SERVER_URL }}/{{ .Env.GITHUB_REPOSITORY }}"
      org.opencontainers.image.created: "{{ .Date }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.version: "{{ .Tag }}"
      podbox.guest_version: "{{ .Tag }}"
      podbox.protocol_version: "1"
      podbox.integration.wayland: "true"
      podbox.integration.audio: "true"
      podbox.integration.gpu: "true"
      podbox.integration.dbus: "true"
      podbox.shell: "/usr/bin/fish"
      podbox.default_shell: "/usr/bin/fish"

homebrew_casks:
  - repository:
      owner: bethropolis
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    name: podbox
    description: "Podman-native container environment manager"
    homepage: "https://github.com/bethropolis/podbox"
    license: "MIT"
    ids:
      - podbox-homebrew
    binaries:
      - podbox
      - podbox-guest
    directory: Casks
    commit_msg_template: "podbox {{ .Tag }}"

release:
  github:
    owner: "{{ .Env.GITHUB_REPOSITORY_OWNER }}"
    name: podbox
  skip_upload: true

changelog:
  use: github
